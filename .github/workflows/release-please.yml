name: Release Please
permissions:
  contents: write
  pull-requests: write
on:
  push:
    branches:
      - main
  workflow_dispatch:
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false
jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      # A GitHub App token (not the default GITHUB_TOKEN) is required so that the
      # release created on merge can trigger the Publish workflow (release: published).
      # Releases created with GITHUB_TOKEN do not trigger other workflows.
      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          client-id: ${{ vars.RELEASE_PLEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_PLEASE_APP_PRIVATE_KEY }}
      - uses: googleapis/release-please-action@v5
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: .github/release-please-config.json
          manifest-file: .github/.release-please-manifest.json
