# Zensical configuration — https://zensical.org/docs/
# Migrated from mkdocs.yml. Zensical discovers config in the order
# zensical.toml > mkdocs.yml > mkdocs.yaml, so this file takes precedence.

[project]
site_name = "Lokksmith"
site_url = "https://lokksmith.dev"
site_description = "Kotlin Multiplatform OpenID Connect client library for Android, iOS, Desktop and Web"
site_author = "Sven Jacobs"
repo_url = "https://github.com/svenjacobs/lokksmith"
repo_name = "Lokksmith"
edit_uri = "edit/main/site/docs/"
copyright = "Copyright &copy; 2025-2026 Sven Jacobs"

nav = [
  { About = "index.md" },
  { "Getting Started" = [
    "getting-started/index.md",
    { Installation = "getting-started/installation.md" },
    { Usage = "getting-started/usage.md" },
    { Demo = "getting-started/demo.md" },
  ] },
  { Migration = "migration.md" },
  { FAQ = "faq.md" },
  { "Dependency Matrix" = "dependency-matrix.md" },
  { Comparison = "comparison.md" },
  { Contributing = "contributing.md" },
  { Resources = "resources.md" },
]

# ----------------------------------------------------------------------------
# Theme
# ----------------------------------------------------------------------------
[project.theme]
features = [
  "content.action.edit",
  "content.action.view",
  "content.code.copy",
  "content.code.annotate",
  "content.tooltips",
  "navigation.expand",
  "navigation.indexes",
  "navigation.instant",
  "navigation.instant.progress",
  "navigation.sections",
  "navigation.tabs",
  "navigation.top",
  "navigation.tracking",
]

# Disable web fonts entirely: no Google Fonts (gstatic preconnect +
# googleapis stylesheet) requests; falls back to the theme's system-font
# stack. Replaces the old mkdocs hooks/fonts.py Bunny Fonts privacy rewrite,
# which Zensical never ran.
font = false

[project.theme.icon]
logo = "material/lock-outline"
repo = "fontawesome/brands/github"

# System preference / light / dark color scheme toggle
[[project.theme.palette]]
media = "(prefers-color-scheme)"
toggle.icon = "material/brightness-auto"
toggle.name = "Switch to light mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
primary = "lime"
toggle.icon = "material/brightness-7"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
primary = "lime"
toggle.icon = "material/brightness-4"
toggle.name = "Switch to system preference"

# ----------------------------------------------------------------------------
# Extra — custom variables (consumed by the macros extension) and social links
# ----------------------------------------------------------------------------
[project.extra]
lokksmith_version = "1.1.4"
lokksmith_version_date = "Jun 27, 2026"

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/svenjacobs"

[[project.extra.social]]
icon = "fontawesome/brands/mastodon"
link = "https://androiddev.social/@svenjacobs"

[[project.extra.social]]
icon = "fontawesome/brands/linkedin"
link = "https://www.linkedin.com/in/svenjacobs81/"

# ----------------------------------------------------------------------------
# Markdown extensions
# ----------------------------------------------------------------------------
[project.markdown_extensions.abbr]
[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.footnotes]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.tables]

[project.markdown_extensions.toc]
permalink = true

[project.markdown_extensions.pymdownx.snippets]

[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true

[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.superfences]
[project.markdown_extensions.pymdownx.details]

# Python tags (!!python/name:...) can't be expressed in TOML, so the emoji
# index/generator are given as importable string references that Zensical
# resolves at load time.
[project.markdown_extensions.pymdownx.emoji]
emoji_index = "zensical.extensions.emoji.twemoji"
emoji_generator = "zensical.extensions.emoji.to_svg"

# ----------------------------------------------------------------------------
# Plugins
# ----------------------------------------------------------------------------
# search is enabled by default. macros powers the {{ ... }} variables above.
[project.plugins.macros]
on_undefined = "strict"

# ----------------------------------------------------------------------------
# Validation
# ----------------------------------------------------------------------------
# Zensical validates links on the raw Markdown before macros expand, so
# macro-templated links (e.g. {{ config.repo_url }}/...md) are false-positives.
# See https://github.com/zensical/zensical/issues/730 (bug, "not fixable" for now).
[project.validation]
invalid_links = false
